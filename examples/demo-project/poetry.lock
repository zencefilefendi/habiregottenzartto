# Demo poetry.lock — intentionally pins old, known-vulnerable versions so the
# scanner has something real to find. Demonstrates: reachable vs unreachable
# findings, transitive reachability, symbol-level hits, and a typosquat.

[[package]]
name = "requests"
version = "2.19.1"
description = "Python HTTP for Humans."
category = "main"
optional = false
python-versions = "*"

